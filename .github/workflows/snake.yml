name: Generate Snake

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: anadisharma1501
          outputs: |
            dist/github-snake.svg?color_snake=%2300b4d8&color_dots=%231a2535,%230d3b4f,%230e6b8c,%230fa3b1,%2300e5ff
            dist/github-snake-dark.svg?color_snake=%2300b4d8&color_dots=%231a2535,%230d3b4f,%230e6b8c,%230fa3b1,%2300e5ff
            dist/github-snake.gif?color_snake=%2300b4d8&color_dots=%231a2535,%230d3b4f,%230e6b8c,%230fa3b1,%2300e5ff

      - name: Push Snake to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
